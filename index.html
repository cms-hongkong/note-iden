<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Identification Game - Super Pro</title>
    <style>
        :root {
            --mint: #B2F2BB;
            --pink: #FFD6E0;
            --blue: #A2D2FF;
            --yellow: #FEF9E7;
            --text: #5B5B5B;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(180deg, #E3F2FD 0%, #F3E5F5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            overflow: hidden;
        }

        #game-container {
            background: white;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 15px 0px #CBD5E0, 0 25px 50px rgba(0,0,0,0.1);
            width: 1000px;
            position: relative;
            text-align: center;
            border: 10px solid white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .score-board, .timer-box {
            background: var(--yellow);
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            border: 3px solid #FAD7A0;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #FF85A1;
            text-shadow: 2px 2px 0px #FFF;
        }

        canvas {
            width: 100%;
            height: 280px;
            background: white;
            border-radius: 20px;
            margin: 10px 0;
        }

        #piano {
            display: flex;
            justify-content: center;
            height: 200px;
            padding: 15px;
            background: #F7FAFC;
            border-radius: 25px;
            border: 4px solid #EDF2F7;
        }

        .key {
            width: 48px;
            height: 100%;
            background: white;
            border: 1px solid #D1D5DB;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            z-index: 1;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #E2E8F0;
        }

        .key.black {
            width: 32px;
            height: 120px;
            background: #4A5568;
            margin: 0 -16px;
            z-index: 2;
            border: none;
            box-shadow: 0 4px 0 #2D3748;
        }

        .key:active { transform: translateY(4px); box-shadow: none; background: #FFEBEE; }
        .key.black:active { background: #000; }

        /* 結束彈窗樣式 */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .input-group {
            background: var(--pink);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 8px 0 #F78DA7;
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            font-size: 1.3rem;
            border-radius: 15px;
            border: 3px solid white;
            text-align: center;
            outline: none;
            width: 250px;
        }

        .btn-fancy {
            background: #FF85A1;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 0 #D6336C;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-fancy:active { transform: translateY(4px); box-shadow: 0 4px 0 #D6336C; }

        .leaderboard {
            width: 80%;
            background: var(--mint);
            padding: 20px;
            border-radius: 25px;
            margin-top: 10px;
        }

        #last-result-display {
            font-size: 1.8rem;
            color: #2D3748;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #feedback-text {
            position: absolute;
            top: 45%; left: 55%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 900;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="score-board">⭐ SCORE: <span id="score">0</span></div>
        <h1>Note Identification Game</h1>
        <div class="timer-box" id="timer">01:00</div>
    </div>

    <canvas id="staffCanvas" width="1000" height="280"></canvas>
    <div id="feedback-text"></div>

    <div id="piano"></div>

    <div id="overlay">
        <div id="final-stats-view" style="display: none;">
            <div id="last-result-display"></div>
            <div class="leaderboard">
                <h3 style="margin: 0 0 10px 0;">🏆 High Score Records</h3>
                <div id="highScores"></div>
            </div>
            <button class="btn-fancy" onclick="resetForNewGame()">Play Again! 🚀</button>
        </div>

        <div id="input-view">
            <h2 style="font-size: 2.8rem; color: #FF85A1; margin-top: 0;">Time's Up! 🍭</h2>
            <div class="input-group">
                <p style="font-size: 1.4rem; margin-top: 0;">Amazing! What's your name?</p>
                <input type="text" id="playerName" placeholder="Enter Name" maxlength="12">
                <br>
                <button class="btn-fancy" onclick="submitScore()">SUBMIT SCORE</button>
            </div>
        </div>

        <div id="start-view">
            <h2 style="font-size: 2.5rem; color: #5B5B5B;">Ready for Music Fun?</h2>
            <button class="btn-fancy" onclick="startGame()">START GAME 🚀</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('staffCanvas');
    const ctx = canvas.getContext('2d');
    const pianoContainer = document.getElementById('piano');
    const feedbackText = document.getElementById('feedback-text');

    let score = 0;
    let timeLeft = 60;
    let gameActive = false;
    let targetNote = "";
    let noteColor = "#5B5B5B";
    let timerId;

    const s = 24; 
    const centerY = canvas.height / 2; 

    const noteMap = {
        "C4": -6, "D4": -5, "E4": -4, "F4": -3, "G4": -2, "A4": -1, "B4": 0,
        "C5": 1,  "D5": 2,  "E5": 3,  "F5": 4,  "G5": 5,  "A5": 6,  "B5": 7, "C6": 8
    };

    const pianoLayout = [
        "C4","C#4","D4","D#4","E4","F4","F#4","G4","G#4","A4","A#4","B4",
        "C5","C#5","D5","D#5","E5","F5","F#5","G5","G#5","A5","A#5","B5","C6"
    ];

    function drawStaff() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 畫五線譜
        ctx.strokeStyle = "#D1D5DB";
        ctx.lineWidth = 2.5;
        for (let i = -2; i <= 2; i++) {
            let y = centerY + (i * s);
            ctx.beginPath(); ctx.moveTo(50, y); ctx.lineTo(950, y); ctx.stroke();
        }

        // --- 高音譜號：大 50% 並精確對齊 ---
        ctx.save();
        ctx.fillStyle = "#5B5B5B";
        // 大 50%：從 s*9 變成 s*13.5
        ctx.font = `${s * 13.5}px Arial`;
        ctx.textBaseline = "middle";
        
        // 坐標精密調整：因為字體變大，Y 軸偏移需微調以維持視覺比例
        // 寬度縮窄 0.8 倍保持形態，高度不變
        ctx.translate(80, centerY + s * 1.3); 
        ctx.scale(0.8, 1); 
        ctx.fillText("𝄞", 0, 0); 
        ctx.restore();

        if (targetNote) renderNote();
    }

    function renderNote() {
        const steps = noteMap[targetNote];
        const y = centerY - (steps * (s / 2));
        const x = canvas.width / 2 + 80;

        ctx.strokeStyle = noteColor;
        ctx.lineWidth = 4;

        // 全音符：空心、斜率反轉 (/)
        ctx.beginPath();
        ctx.ellipse(x, y, s * 0.75, s * 0.6, -Math.PI / 8, 0, 2 * Math.PI);
        ctx.stroke();

        // 加線 (C4, A5, C6)
        if (steps <= -6) { ctx.beginPath(); ctx.moveTo(x-30, centerY+s*3); ctx.lineTo(x+30, centerY+s*3); ctx.stroke(); }
        if (steps >= 6) { ctx.beginPath(); ctx.moveTo(x-30, centerY-s*3); ctx.lineTo(x+30, centerY-s*3); ctx.stroke(); }
        if (steps >= 8) { ctx.beginPath(); ctx.moveTo(x-30, centerY-s*4); ctx.lineTo(x+30, centerY-s*4); ctx.stroke(); }
    }

    function initPiano() {
        pianoLayout.forEach(note => {
            const div = document.createElement('div');
            div.className = `key ${note.includes("#") ? 'black' : ''}`;
            div.onclick = () => handleInput(note);
            pianoContainer.appendChild(div);
        });
    }

    function handleInput(note) {
        if (!gameActive) return;
        if (note === targetNote) {
            noteColor = "#5B5B5B"; 
            score += 10;
            document.getElementById('score').innerText = score;
            showFeedback("🌈 GREAT!", "#4CAF50");
            next();
        } else {
            noteColor = "#FF5252"; 
            showFeedback("Oops! 🍎", "#FF5252");
            drawStaff();
        }
    }

    function showFeedback(text, color) {
        feedbackText.innerText = text;
        feedbackText.style.color = color;
        feedbackText.style.display = 'block';
        setTimeout(() => feedbackText.style.display = 'none', 600);
    }

    function next() {
        const keys = Object.keys(noteMap);
        let newNote;
        do {
            newNote = keys[Math.floor(Math.random() * keys.length)];
        } while (newNote === targetNote);
        targetNote = newNote;
        noteColor = "#5B5B5B"; 
        drawStaff(); 
    }

    function startGame() {
        score = 0;
        timeLeft = 60;
        gameActive = true;
        document.getElementById('score').innerText = "0";
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('start-view').style.display = 'none';
        document.getElementById('input-view').style.display = 'none';
        document.getElementById('final-stats-view').style.display = 'none';
        
        timerId = setInterval(() => {
            timeLeft--;
            let m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            let sec = String(timeLeft % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${sec}`;
            if (timeLeft <= 0) endGame();
        }, 1000);
        
        next();
    }

    function endGame() {
        gameActive = false;
        clearInterval(timerId);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('input-view').style.display = 'block';
    }

    function submitScore() {
        const name = document.getElementById('playerName').value.trim() || "Musician";
        const newRecord = { name: name, score: score, date: new Date().toLocaleDateString() };
        
        // 儲存到 LocalStorage
        let records = JSON.parse(localStorage.getItem('cmsNoteRecords') || "[]");
        records.push(newRecord);
        records.sort((a, b) => b.score - a.score);
        records = records.slice(0, 5); 
        localStorage.setItem('cmsNoteRecords', JSON.stringify(records));
        
        // 顯示結果與名次
        document.getElementById('input-view').style.display = 'none';
        document.getElementById('final-stats-view').style.display = 'block';
        document.getElementById('last-result-display').innerText = `Player: ${name} | Score: ${score} pts`;
        
        displayHighScores();
    }

    function displayHighScores() {
        const records = JSON.parse(localStorage.getItem('cmsNoteRecords') || "[]");
        const listArea = document.getElementById('highScores');
        if (records.length === 0) {
            listArea.innerHTML = "<p>Play to set a record!</p>";
            return;
        }
        let html = "<table style='width:100%; border-spacing: 0 10px; font-size: 1.2rem;'>";
        records.forEach((r, idx) => {
            html += `<tr><td style='text-align:left;'>#${idx+1} ${r.name}</td><td style='text-align:right; font-weight:bold;'>${r.score} pts</td></tr>`;
        });
        html += "</table>";
        listArea.innerHTML = html;
    }

    function resetForNewGame() {
        document.getElementById('playerName').value = "";
        startGame();
    }

    window.onload = () => {
        initPiano();
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('start-view').style.display = 'block';
        document.getElementById('input-view').style.display = 'none';
        document.getElementById('final-stats-view').style.display = 'none';
        drawStaff();
    };
</script>

</body>
</html>
