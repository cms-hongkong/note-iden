<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Identification Game</title>
    <style>
        :root {
            --mint: #B2F2BB;
            --pink: #FFD6E0;
            --blue: #A2D2FF;
            --yellow: #FEF9E7;
            --text: #5B5B5B;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(180deg, #E3F2FD 0%, #F3E5F5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
        }

        #game-container {
            background: white;
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 15px 0px #CBD5E0, 0 25px 50px rgba(0,0,0,0.1);
            width: 950px;
            position: relative;
            text-align: center;
            border: 10px solid white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .score-board, .timer-box {
            background: var(--yellow);
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1.4rem;
            font-weight: bold;
            border: 3px solid #FAD7A0;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            color: #FF85A1;
            text-shadow: 2px 2px 0px #FFF, 4px 4px 0px rgba(0,0,0,0.05);
        }

        canvas {
            width: 100%;
            height: 240px;
            background: white;
            border-radius: 20px;
            margin: 10px 0;
        }

        /* 鋼琴樣式 */
        #piano {
            display: flex;
            justify-content: center;
            height: 200px;
            padding: 15px;
            background: #F7FAFC;
            border-radius: 25px;
            border: 4px solid #EDF2F7;
        }

        .key {
            width: 46px;
            height: 100%;
            background: white;
            border: 1px solid #D1D5DB;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            z-index: 1;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #E2E8F0;
        }

        .key.black {
            width: 30px;
            height: 120px;
            background: #4A5568;
            margin: 0 -15px;
            z-index: 2;
            border: none;
            box-shadow: 0 4px 0 #2D3748;
        }

        .key:active { transform: translateY(4px); box-shadow: none; background: #FFEBEE; }
        .key.black:active { background: #000; }

        /* 結束彈窗與紀錄 */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .record-list {
            margin: 20px 0;
            width: 80%;
            background: var(--yellow);
            padding: 15px;
            border-radius: 20px;
            list-style: none;
            text-align: left;
        }

        input {
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 15px;
            border: 2px solid var(--blue);
            margin-bottom: 15px;
            text-align: center;
        }

        .btn-fancy {
            background: #FF85A1;
            color: white;
            padding: 12px 35px;
            border-radius: 30px;
            font-size: 1.3rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 0 #D6336C;
            font-weight: bold;
        }

        .btn-fancy:active { transform: translateY(3px); box-shadow: 0 3px 0 #D6336C; }

        #feedback-text {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 900;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="score-board">✨ SCORE: <span id="score">0</span></div>
        <h1>Note Identification Game</h1>
        <div class="timer-box" id="timer">01:00</div>
    </div>

    <canvas id="staffCanvas" width="1000" height="240"></canvas>
    <div id="feedback-text"></div>

    <div id="piano"></div>

    <div id="overlay">
        <h2 id="result-title" style="font-size: 2.5rem; margin: 10px; color: #FF85A1;">Time's Up! 🍭</h2>
        <div id="score-input-area">
            <p style="font-size: 1.3rem;">Great Job! Enter your name:</p>
            <input type="text" id="playerName" placeholder="Your Name" maxlength="10">
            <br>
            <button class="btn-fancy" onclick="submitScore()">Submit & Play Again</button>
        </div>
        
        <div class="record-list">
            <h3 style="margin: 0 0 10px 0;">🏆 High Scores</h3>
            <div id="highScores"></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('staffCanvas');
    const ctx = canvas.getContext('2d');
    const pianoContainer = document.getElementById('piano');
    const feedbackText = document.getElementById('feedback-text');

    let score = 0;
    let timeLeft = 60;
    let gameActive = false;
    let targetNote = "";
    let noteColor = "#5B5B5B";
    let timerId;

    const s = 24; 
    const centerY = canvas.height / 2; 

    const noteMap = {
        "C4": -6, "D4": -5, "E4": -4, "F4": -3, "G4": -2, "A4": -1, "B4": 0,
        "C5": 1,  "D5": 2,  "E5": 3,  "F5": 4,  "G5": 5,  "A5": 6,  "B5": 7, "C6": 8
    };

    const pianoLayout = [
        "C4","C#4","D4","D#4","E4","F4","F#4","G4","G#4","A4","A#4","B4",
        "C5","C#5","D5","D#5","E5","F5","F#5","G5","G#5","A5","A#5","B5","C6"
    ];

    function drawStaff() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 畫五線譜
        ctx.strokeStyle = "#D1D5DB";
        ctx.lineWidth = 2;
        for (let i = -2; i <= 2; i++) {
            let y = centerY + (i * s);
            ctx.beginPath(); ctx.moveTo(50, y); ctx.lineTo(950, y); ctx.stroke();
        }

        // --- 高音譜號精確調整 ---
        ctx.save();
        ctx.fillStyle = "#5B5B5B";
        ctx.font = `${s * 9}px Arial`;
        ctx.textBaseline = "middle";
        
        // 1. 橫向縮窄 (scaleX)
        // 2. 移動座標：原本位置上移 24px (centerY + s*0.5)
        ctx.translate(70, centerY + s * 0.5); 
        ctx.scale(0.8, 1); // 橫向壓縮到 80%，讓腹部看起來縮窄
        ctx.fillText("𝄞", 0, 0); 
        ctx.restore();

        if (targetNote) renderNote();
    }

    function renderNote() {
        const steps = noteMap[targetNote];
        const y = centerY - (steps * (s / 2));
        const x = canvas.width / 2 + 50;

        ctx.strokeStyle = noteColor;
        ctx.lineWidth = 3;

        // 全音符：空心、斜率反轉 (/)
        ctx.beginPath();
        // 旋轉角度改為 -Math.PI / 8 實現水平反轉
        ctx.ellipse(x, y, s * 0.7, s * 0.55, -Math.PI / 8, 0, 2 * Math.PI);
        ctx.stroke();

        // 畫加線
        if (steps <= -6) { ctx.beginPath(); ctx.moveTo(x-25, centerY+s*3); ctx.lineTo(x+25, centerY+s*3); ctx.stroke(); }
        if (steps >= 6) { ctx.beginPath(); ctx.moveTo(x-25, centerY-s*3); ctx.lineTo(x+25, centerY-s*3); ctx.stroke(); }
        if (steps >= 8) { ctx.beginPath(); ctx.moveTo(x-25, centerY-s*4); ctx.lineTo(x+25, centerY-s*4); ctx.stroke(); }
    }

    function initPiano() {
        pianoLayout.forEach(note => {
            const div = document.createElement('div');
            div.className = `key ${note.includes("#") ? 'black' : ''}`;
            div.onclick = () => handleInput(note);
            pianoContainer.appendChild(div);
        });
    }

    function handleInput(note) {
        if (!gameActive) return;
        if (note === targetNote) {
            noteColor = "#5B5B5B"; 
            score += 10;
            document.getElementById('score').innerText = score;
            showFeedback("🌈 WELL DONE!", "#4CAF50");
            next();
        } else {
            noteColor = "#FF5252"; 
            showFeedback("Ouch! 🍎", "#FF5252");
            drawStaff();
        }
    }

    function showFeedback(text, color) {
        feedbackText.innerText = text;
        feedbackText.style.color = color;
        feedbackText.style.display = 'block';
        setTimeout(() => feedbackText.style.display = 'none', 600);
    }

    function next() {
        const keys = Object.keys(noteMap);
        let newNote;
        do {
            newNote = keys[Math.floor(Math.random() * keys.length)];
        } while (newNote === targetNote); // 避免連續出同一題
        targetNote = newNote;
        noteColor = "#5B5B5B"; 
        drawStaff(); 
    }

    function startGame() {
        score = 0;
        timeLeft = 60;
        gameActive = true;
        document.getElementById('score').innerText = "0";
        document.getElementById('overlay').style.display = 'none';
        
        timerId = setInterval(() => {
            timeLeft--;
            let m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            let sec = String(timeLeft % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${sec}`;
            if (timeLeft <= 0) endGame();
        }, 1000);
        
        next();
    }

    function endGame() {
        gameActive = false;
        clearInterval(timerId);
        document.getElementById('overlay').style.display = 'flex';
        displayHighScores();
    }

    // 分數紀錄功能 (LocalStorage)
    function submitScore() {
        const name = document.getElementById('playerName').value || "Little Musician";
        const newRecord = { name: name, score: score, date: new Date().toLocaleDateString() };
        
        let records = JSON.parse(localStorage.getItem('noteGameRecords') || "[]");
        records.push(newRecord);
        records.sort((a, b) => b.score - a.score);
        records = records.slice(0, 5); // 只保留前5名
        
        localStorage.setItem('noteGameRecords', JSON.stringify(records));
        
        document.getElementById('playerName').value = "";
        startGame(); // 重新開始
    }

    function displayHighScores() {
        const records = JSON.parse(localStorage.getItem('noteGameRecords') || "[]");
        const listArea = document.getElementById('highScores');
        if (records.length === 0) {
            listArea.innerHTML = "<p>No records yet. Be the first!</p>";
            return;
        }
        let html = "<table style='width:100%'>";
        records.forEach((r, index) => {
            html += `<tr><td>${index+1}. ${r.name}</td><td style='text-align:right'>${r.score} pts</td></tr>`;
        });
        html += "</table>";
        listArea.innerHTML = html;
    }

    window.onload = () => {
        initPiano();
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('score-input-area').innerHTML = `<button class="btn-fancy" onclick="startGame()">START GAME 🚀</button>`;
        displayHighScores();
        drawStaff();
    };
</script>

</body>
</html>
