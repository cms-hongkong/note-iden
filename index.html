<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMS Note Identification Game - Precision Pro</title>
    <style>
        :root { --primary-teal: #4db6ac; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding-top: 50px; }
        #game-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 800px; }
        .status { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #444; }
        canvas { width: 100%; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        #piano { display: flex; justify-content: center; height: 180px; position: relative; }
        .key { width: 45px; height: 100%; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 0 0 5px 5px; z-index: 1; }
        .key.black { width: 30px; height: 110px; background: #333; margin: 0 -15px; z-index: 2; border: none; }
        .key:active { background: #e0e0e0; }
        .key.black:active { background: #000; }
        .btn-group { display: flex; justify-content: flex-end; gap: 10px; }
        .btn { background: var(--primary-teal); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="status">
        <span id="score">Score: 0/20 ✅</span>
        <span id="timer">🕒 00:00</span>
    </div>

    <canvas id="staffCanvas" width="800" height="200"></canvas>

    <div id="piano"></div>

    <div class="btn-group" style="margin-top: 20px;">
        <button class="btn" onclick="location.reload()">Reset Game</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('staffCanvas');
    const ctx = canvas.getContext('2d');
    const pianoContainer = document.getElementById('piano');

    // --- 核心比例參數 ---
    const s = 20; // 線與線之間的距離 (Space)
    const centerY = canvas.height / 2; // 第三線 (B4) 的 Y 座標位置
    let currentTarget = "";
    let score = 0;

    // 音符與 B4 (中心線) 的半音步數差
    // 負數代表在下面，正數代表在上面
    const noteData = {
        "C4": -6, "D4": -5, "E4": -4, "F4": -3, "G4": -2, "A4": -1, 
        "B4": 0,  "C5": 1,  "D5": 2,  "E5": 3,  "F5": 4,  "G5": 5, "A5": 6
    };

    const pianoLayout = [
        {n:"C4",t:"w"}, {n:"C#4",t:"b"}, {n:"D4",t:"w"}, {n:"D#4",t:"b"}, {n:"E4",t:"w"},
        {n:"F4",t:"w"}, {n:"F#4",t:"b"}, {n:"G4",t:"w"}, {n:"G#4",t:"b"}, {n:"A4",t:"w"}, {n:"A#4",t:"b"}, {n:"B4",t:"w"},
        {n:"C5",t:"w"}, {n:"C#5",t:"b"}, {n:"D5",t:"w"}, {n:"D#5",t:"b"}, {n:"E5",t:"w"},
        {n:"F5",t:"w"}, {n:"F#5",t:"b"}, {n:"G5",t:"w"}, {n:"G#5",t:"b"}, {n:"A5",t:"w"}
    ];

    function drawStaff() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 1.5;

        // 1. 畫五線譜 (以 centerY 為中心畫 5 條線)
        for (let i = -2; i <= 2; i++) {
            let y = centerY + (i * s);
            ctx.beginPath();
            ctx.moveTo(50, y);
            ctx.lineTo(750, y);
            ctx.stroke();
        }

        // 2. 畫高音譜號 (Treble Clef)
        ctx.font = `${s * 4.5}px Arial`; 
        ctx.fillStyle = "#000";
        // 高音譜號的精確基準：G4 螺旋中心在第二線 (centerY + s)
        ctx.fillText("𝄞", 70, centerY + s * 1.2); 

        // 3. 畫題目音符
        if (currentTarget) drawNote(currentTarget);
    }

    function drawNote(noteName) {
        const steps = noteData[noteName];
        if (steps === undefined) return;

        // 計算音符中心的 Y 座標：每一步是半個間距 (s/2)
        // 因為音名越高 Y 越小，所以是用減法
        const y = centerY - (steps * (s / 2));
        const x = canvas.width / 2;

        ctx.fillStyle = "#000";
        ctx.beginPath();
        // 音符符頭比例：寬 1.2s, 高 1s
        ctx.ellipse(x, y, s * 0.6, s * 0.5, Math.PI / 8, 0, 2 * Math.PI);
        ctx.fill();

        // 4. 畫符桿 (Stem)
        ctx.lineWidth = 2;
        ctx.beginPath();
        if (steps >= 0) { // B4 以上符桿向下
            ctx.moveTo(x - s * 0.5, y);
            ctx.lineTo(x - s * 0.5, y + s * 3.5);
        } else { // B4 以下符桿向上
            ctx.moveTo(x + s * 0.5, y);
            ctx.lineTo(x + s * 0.5, y - s * 3.5);
        }
        ctx.stroke();

        // 5. 加線 (Ledger Lines) - 針對 C4 或 A5 等超出五線譜的音
        if (noteName === "C4") {
            ctx.beginPath();
            ctx.moveTo(x - s, centerY + s * 3);
            ctx.lineTo(x + s, centerY + s * 3);
            ctx.stroke();
        }
    }

    function initPiano() {
        pianoLayout.forEach(key => {
            const div = document.createElement('div');
            div.className = `key ${key.t === 'b' ? 'black' : ''}`;
            div.onclick = () => checkAnswer(key.n);
            pianoContainer.appendChild(div);
        });
    }

    function checkAnswer(note) {
        if (note === currentTarget) {
            score++;
            document.getElementById('score').innerText = `Score: ${score}/20 ✅`;
            nextRound();
        }
    }

    function nextRound() {
        const keys = Object.keys(noteData);
        currentTarget = keys[Math.floor(Math.random() * keys.length)];
        drawStaff();
    }

    initPiano();
    nextRound();
</script>

</body>
</html>
